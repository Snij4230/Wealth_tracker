<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Wealth Tracker — Mortgage + TFSA + RRSP (30 Years)</title>

  <!-- ✅ Correct Chart.js import -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root{
      --bg:#ffffff;
      --card:#f7f7f9;
      --text:#111;
      --muted:#666;
      --border:#ddd;
      --accent:#0b5fff;
    }
    body{ font-family: Arial, sans-serif; margin:0; background:var(--bg); color:var(--text); }
    header{ padding:24px 16px; text-align:center; border-bottom:1px solid var(--border); }
    header h1{ margin:0; font-size:34px; }
    header p{ margin:8px 0 0; color:var(--muted); }

    .container{ max-width:1100px; margin:0 auto; padding:16px; }

    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width: 900px){ .grid{ grid-template-columns:1fr; } }

    .card{ background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
    .card h2{ margin:0 0 10px; font-size:18px; }

    .row{ display:grid; grid-template-columns:1fr 180px; gap:10px; align-items:center; margin:8px 0; }
    .row label{ color:#222; }
    .row input, .row select{
      width:100%; padding:8px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fff;
    }

    .actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
    button{
      padding:10px 14px; border-radius:10px; border:1px solid var(--border);
      background:#fff; cursor:pointer; font-weight:600;
    }
    button.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }

    .summary{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:16px; }
    @media (max-width: 900px){ .summary{ grid-template-columns:1fr 1fr; } }
    @media (max-width: 520px){ .summary{ grid-template-columns:1fr; } }
    .stat{ background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px; }
